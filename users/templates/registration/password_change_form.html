{% extends "base.html" %}
{% load static %}
{% block static %}
	<link rel="stylesheet" href="{% static 'pages/index.css' %}">
{% endblock %}
{% block title %}Изменить пароль{% endblock %}
{% block css %}
    <link rel="stylesheet" href="{% static 'pages/form.css' %}">
{% endblock %}
{% block content %}
<div class="main__header">
    <h1 class="main__title">Изменить пароль</h1>
</div>
<div class="form-container">
    <form class="form" method="post" >
        {% csrf_token %}
        {% for field in form %}
        <div class="form__group">
            <label for="{{ field.id_for_label }}" class="form__label">{{ field.label }}
            </label>
            <div class="form__field-group">
                <input type="{{ field.widget_type }}" name="{{ field.html_name }}" id="{{ field.id_for_label }}" class="form__input" required>
                <span class="form__error">{{ field.errors }}</span>
            </div>
        </div>
        {% endfor %}
        <div class="form__footer">
            <input class="button button_style_blue" type="submit" value="Изменить пароль" /><br>
        </div>
    </form>
</div>
{% endblock %}
